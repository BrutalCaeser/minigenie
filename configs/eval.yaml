# Evaluation Settings
# Source: docs/build_spec.md §7
# Scope: CoinRun only (single game — prioritising depth of analysis over breadth)

# --- Single-step prediction quality (§7.1) ---
single_step:
  num_test_sequences: 1000                # From CoinRun episodes
  batch_size: 16
  target_psnr_db: 22.0
  metrics:
    - psnr
    - ssim

# --- Rollout quality degradation (§7.2) ---
rollout:
  num_rollouts: 200                       # 200 rollouts (practical for single session)
  max_steps: 50                           # Generate 50-step rollouts
  metrics:
    - psnr_per_step                       # Plot mean PSNR vs step number
    - ssim_per_step

# --- Action differentiation (§7.3) ---
action_differentiation:
  num_start_frames: 100
  num_actions: 15                         # Generate 1-step pred for all 15 actions
  metric: mean_l2_distance                # Between predictions with different actions

# --- Qualitative analysis (§7.5) ---
qualitative:
  num_cherry_picked: 10                   # Best rollouts (highest mean PSNR)
  num_failure_cases: 10                   # Worst rollouts (lowest mean PSNR)
  rollout_steps: 20                       # Steps for cherry-picked rollouts
  output_format:
    - gif
    - png_grid

# --- Inference settings ---
inference:
  num_steps: 15                           # Euler ODE steps
  cfg_scale: 2.0

# --- Data ---
data:
  game: coinrun
  data_dir: data/coinrun/episodes         # Relative to project root
  context_length: 4
  cfg_scales_to_sweep: [1.5, 2.0, 3.0]   # For ablation

# --- Reproducibility ---
seed: 42
